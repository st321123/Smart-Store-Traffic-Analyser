# Table Name: price_master
# ┌─────────────────────┬─────────────────────────┬─────────┐
# │ Column              │ Data Type               │ Key     │
# ├─────────────────────┼─────────────────────────┼─────────┤
# │ price_id            │ character varying(50)   │ PRIMARY │
# │ product_id          │ character varying(50)   │ FK      │
# │ location_id         │ character varying(50)   │ FK      │
# │ regular_price       │ numeric(18,2)           │         │
# │ selling_price       │ numeric(18,2)           │         │
# │ effective_start_dt  │ date                    │         │
# │ effective_end_dt    │ date                    │         │
# └─────────────────────┴─────────────────────────┴─────────┘
cubes:
  - name: Pricing
    sql_table: price_master
    description: Product pricing details by location and effective date range

    dimensions:
      - name: price_id
        sql: price_id
        type: string
        primary_key: true

      - name: product_id
        sql: product_id
        type: string

      - name: location_id
        sql: location_id
        type: string

      - name: regular_price
        sql: regular_price
        type: number

      - name: selling_price
        sql: selling_price
        type: number

      - name: effective_start_dt
        sql: effective_start_dt
        type: time

      - name: effective_end_dt
        sql: effective_end_dt
        type: time

    measures:
      - name: avg_regular_price 
        sql: regular_price
        type: avg
      - name: avg_selling_price
        sql: selling_price
        type: avg
      - name: max_regular_price
        sql: regular_price
        type: max

      - name: min_selling_price
        sql: selling_price
        type: min
      - name: total_price_records
        sql: price_id
        type: count 

    joins:
      - name: Location
        sql: "{Pricing}.location_id = {Location}.location_id"
        relationship: many_to_one

      - name: Product
        sql: "{Pricing}.product_id = {Product}.product_id"
        relationship: many_to_one